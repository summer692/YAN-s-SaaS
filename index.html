<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#007AFF" />
  <title>YAN's SaaS</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="YAN's SaaS" />
  <style>
    /* 启动画面 — 内联在 head，保证比任何外部资源更早渲染。
       配色刻意与 manifest.background_color 一致，让 iOS 原生 splash
       和 JS splash 视觉无缝衔接。 */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: linear-gradient(180deg, #0A84FF 0%, #0050D5 100%);
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash .splash-logo {
      width: 96px;
      height: 96px;
      animation: splash-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    #splash .splash-name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      opacity: 0;
      animation: splash-fade-in 0.4s ease-out 0.15s forwards;
    }
    @keyframes splash-pop {
      0%   { transform: scale(0.6); opacity: 0; }
      60%  { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes splash-fade-in {
      to { opacity: 1; }
    }
  </style>
  <link rel="stylesheet" href="themes.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="white">
  <div id="splash" aria-hidden="true">
    <svg class="splash-logo" viewBox="0 0 1024 1024">
      <g fill="none" stroke="#FFFFFF" stroke-width="120" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 296 308 L 512 600"/>
        <path d="M 728 308 L 512 600"/>
        <path d="M 512 600 L 512 768"/>
      </g>
    </svg>
    <div class="splash-name">YAN's SaaS</div>
  </div>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-dot"></span>
        <div class="brand-text">
          <h1>YAN's SaaS</h1>
          <div class="shortcut-hint">
            <kbd>N</kbd> 新建
            <kbd>I</kbd> 灵感
            <kbd>/</kbd> 搜索
            <kbd>1</kbd>–<kbd>4</kbd> 切页
          </div>
        </div>
      </div>
      <div class="header-tools">
        <div class="header-menu" id="header-menu">
          <button class="icon-btn" id="header-menu-toggle" title="主题和设置" aria-label="主题和设置">⋯</button>
          <div class="header-menu-panel" id="header-menu-panel" hidden>
            <div class="menu-section">
              <div class="menu-section-label">主题</div>
              <div class="theme-swatches">
                <button class="theme-swatch-btn" data-theme="white" title="白色"><span class="theme-swatch" data-theme="white"></span></button>
                <button class="theme-swatch-btn" data-theme="black" title="黑色"><span class="theme-swatch" data-theme="black"></span></button>
                <button class="theme-swatch-btn" data-theme="gray"  title="灰色"><span class="theme-swatch" data-theme="gray"></span></button>
                <button class="theme-swatch-btn" data-theme="blue"  title="蓝色"><span class="theme-swatch" data-theme="blue"></span></button>
                <button class="theme-swatch-btn" data-theme="green" title="绿色"><span class="theme-swatch" data-theme="green"></span></button>
                <button class="theme-swatch-btn" data-theme="pink"  title="粉色"><span class="theme-swatch" data-theme="pink"></span></button>
              </div>
            </div>
            <div class="menu-divider"></div>
            <button class="menu-item" data-action="export">导出 JSON</button>
            <button class="menu-item" data-action="import">导入 JSON</button>
            <button class="menu-item danger-text" data-action="clear">全部清空</button>
          </div>
        </div>
        <input type="file" id="import-file" accept="application/json,.json" hidden />
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <div class="tabs-inner">
        <button class="tab active" data-tab="projects" role="tab">项目</button>
        <button class="tab" data-tab="ideas" role="tab">灵感</button>
        <button class="tab" data-tab="costs" role="tab">成本</button>
        <button class="tab" data-tab="review" role="tab">复盘</button>
      </div>
    </nav>
    <div class="header-search">
      <input
        id="global-search"
        type="search"
        placeholder="搜索项目、灵感、备注…"
        autocomplete="off"
      />
    </div>
    <div class="renewals" id="renewals" hidden></div>
  </header>

  <main class="app-main">
    <!-- 项目页 -->
    <section class="view active" data-view="projects">
      <div class="view-toolbar">
        <div class="filters" id="project-filters">
          <button class="chip active" data-filter="all">全部</button>
          <button class="chip" data-filter="构思中">构思中</button>
          <button class="chip" data-filter="开发中">开发中</button>
          <button class="chip" data-filter="已上线">已上线</button>
          <button class="chip" data-filter="暂停">暂停</button>
          <button class="chip" data-filter="已下线">已下线</button>
        </div>
        <button class="btn-primary" id="btn-new-project">+ 新建项目</button>
      </div>
      <div class="cards" id="project-list"></div>
      <p class="empty-hint" id="project-empty" hidden>还没有项目，点右上角「新建项目」开始记录。</p>
    </section>

    <!-- 灵感页 -->
    <section class="view" data-view="ideas">
      <form class="idea-quick" id="idea-quick-form" autocomplete="off">
        <textarea
          id="idea-quick-input"
          class="idea-quick-input"
          placeholder="冒出来的想法，先写下来再说…（Ctrl/Cmd + Enter 保存）"
          rows="2"
          required
        ></textarea>
        <div class="idea-quick-row">
          <select id="idea-quick-tag" class="select-sm">
            <option value="新项目想法">新项目想法</option>
            <option value="功能改进">功能改进</option>
            <option value="增长营销">增长营销</option>
            <option value="技术想法">技术想法</option>
            <option value="其他" selected>其他</option>
          </select>
          <select id="idea-quick-priority" class="select-sm">
            <option value="低">低</option>
            <option value="中" selected>中</option>
            <option value="高">高</option>
          </select>
          <button type="submit" class="btn-primary">记下</button>
        </div>
      </form>

      <div class="idea-list" id="idea-list"></div>
      <p class="empty-hint" id="idea-empty" hidden>还没有灵感记录，先写一条试试。</p>
    </section>

    <!-- 成本页 -->
    <section class="view" data-view="costs">
      <div class="metrics" id="cost-metrics"></div>
      <div class="table-wrap">
        <table class="cost-table" id="cost-table">
          <thead>
            <tr>
              <th>项目</th>
              <th>状态</th>
              <th class="num">月成本</th>
              <th class="num">月收入</th>
              <th class="num">净值</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p class="empty-hint" id="cost-empty" hidden>还没有项目，先去「项目」页加一个。</p>
    </section>

    <!-- 复盘页 -->
    <section class="view" data-view="review">
      <div class="metrics" id="review-metrics"></div>
      <div class="review-actions">
        <button class="btn-primary" id="btn-ask-claude">让 Claude 复盘 →</button>
        <button class="btn-ghost" id="btn-copy-snapshot">复制快照文本</button>
      </div>
      <details class="snapshot-preview">
        <summary>查看将发给 Claude 的内容</summary>
        <pre id="snapshot-text"></pre>
      </details>
    </section>
  </main>

  <!-- 项目表单弹窗 -->
  <div class="modal" id="project-modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel" role="dialog" aria-modal="true">
      <header class="modal-head">
        <h2 id="project-modal-title">新建项目</h2>
        <button class="icon-btn" data-close aria-label="关闭">×</button>
      </header>
      <form id="project-form" class="form">
        <input type="hidden" name="id" />

        <label class="field">
          <span class="field-label">项目名称 <em>*</em></span>
          <input name="name" type="text" required maxlength="80" />
        </label>

        <div class="field-row">
          <label class="field">
            <span class="field-label">状态</span>
            <select name="status">
              <option>构思中</option>
              <option>开发中</option>
              <option>已上线</option>
              <option>暂停</option>
              <option>已下线</option>
            </select>
          </label>
          <label class="field">
            <span class="field-label">完成度 <span class="muted" id="progress-readout">0%</span></span>
            <input name="progress" type="range" min="0" max="100" step="5" value="0" />
          </label>
        </div>

        <div class="field-row">
          <label class="field">
            <span class="field-label">域名</span>
            <input name="domain" type="text" placeholder="example.com" />
          </label>
          <label class="field">
            <span class="field-label">域名服务商</span>
            <input name="registrar" type="text" placeholder="Namecheap / 阿里云" />
          </label>
        </div>

        <label class="field">
          <span class="field-label">域名到期日</span>
          <input name="domainExpiry" type="date" />
        </label>

        <div class="field-row">
          <label class="field">
            <span class="field-label">域名首年费</span>
            <div class="money-input">
              <select name="domainFeeCurrency" class="cur-select">
                <option value="CNY">¥</option>
                <option value="USD">$</option>
              </select>
              <input name="domainFee" type="number" min="0" step="0.01" />
            </div>
          </label>
          <label class="field">
            <span class="field-label">域名续费 <span class="muted">(可选)</span></span>
            <div class="money-input">
              <select name="domainRenewalFeeCurrency" class="cur-select">
                <option value="CNY">¥</option>
                <option value="USD">$</option>
              </select>
              <input name="domainRenewalFee" type="number" min="0" step="0.01" />
            </div>
          </label>
        </div>

        <label class="field">
          <span class="field-label">技术栈</span>
          <input name="stack" type="text" placeholder="Next.js + Supabase" />
        </label>

        <label class="field">
          <span class="field-label">API Keys / 配置 <span class="muted">一行一条，格式 服务名=密钥</span></span>
          <textarea name="apiKeys" rows="3" placeholder="OpenAI=sk-xxxxxxxxxxxx&#10;Stripe=sk_live_xxxxxxxx"></textarea>
        </label>

        <div class="field-row">
          <label class="field">
            <span class="field-label">月度成本 (¥)</span>
            <input name="monthlyCost" type="number" min="0" step="0.01" />
          </label>
          <label class="field">
            <span class="field-label">月度收入 (¥)</span>
            <input name="monthlyRevenue" type="number" min="0" step="0.01" />
          </label>
        </div>

        <label class="field">
          <span class="field-label">备注 / 下一步</span>
          <textarea name="notes" rows="3" placeholder="当前要做的事…"></textarea>
        </label>

        <footer class="form-actions">
          <button type="button" class="btn-ghost" data-close>取消</button>
          <button type="submit" class="btn-primary">保存</button>
        </footer>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
